[buildPlans.Jedi]
family = "jedi"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false
noLigation = true

[buildPlans.Jedi.variants]
inherits = "ss14"

[buildPlans.Jedi.variants.design]
seven = "straight-serifless"
zero = "slashed"
l = "serifed-semi-tailed"
u = "toothed-serifless"
at = "threefold"
percent = "rings-segmented-slash"

[buildPlans.Jedi.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Jedi.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.Jedi.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.Jedi.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Jedi.weights.ExtraBold]
shape = 800
menu = 800
css = 800

[buildPlans.Jedi.weights.Heavy]
shape = 900
menu = 900
css = 900

[buildPlans.Jedi.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Jedi.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Jedi.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
